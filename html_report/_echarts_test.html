<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts加载测试</title>
</head>
<body style="padding:20px;font-family:sans-serif;">
    <h2>ECharts加载诊断</h2>
    <div id="status" style="padding:10px;margin:10px 0;background:#f0f0f0;border-radius:8px;">正在检测...</div>
    <div id="test-chart" style="width:100%;height:400px;border:2px solid #ccc;border-radius:8px;"></div>
    <div id="log" style="padding:10px;margin:10px 0;background:#f5f5f5;border-radius:8px;white-space:pre-wrap;font-size:12px;"></div>
    
    <script>
        var logEl = document.getElementById('log');
        var statusEl = document.getElementById('status');
        
        function log(msg) {
            logEl.textContent += msg + '\n';
            console.log(msg);
        }
        
        log('1. Script开始执行');
        log('2. typeof echarts: ' + typeof echarts);
        
        if (typeof echarts === 'undefined') {
            statusEl.textContent = '❌ ECharts未加载！尝试动态加载...';
            statusEl.style.background = '#ffebee';
            log('3. ECharts CDN未加载，尝试动态注入script标签');
            
            var script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js';
            script.onload = function() {
                log('4. ECharts动态加载成功！');
                log('5. typeof echarts: ' + typeof echarts);
                statusEl.textContent = '✅ ECharts动态加载成功';
                statusEl.style.background = '#e8f5e9';
                initTestChart();
            };
            script.onerror = function() {
                log('4. ECharts动态加载失败！尝试unpkg CDN...');
                var script2 = document.createElement('script');
                script2.src = 'https://unpkg.com/echarts@5.4.3/dist/echarts.min.js';
                script2.onload = function() {
                    log('5. ECharts从unpkg加载成功！');
                    statusEl.textContent = '✅ ECharts从unpkg加载成功';
                    statusEl.style.background = '#e8f5e9';
                    initTestChart();
                };
                script2.onerror = function() {
                    log('5. ECharts从unpkg也加载失败！');
                    statusEl.textContent = '❌ 所有CDN都无法加载ECharts';
                    statusEl.style.background = '#ffebee';
                };
                document.head.appendChild(script2);
            };
            document.head.appendChild(script);
        } else {
            statusEl.textContent = '✅ ECharts已加载';
            statusEl.style.background = '#e8f5e9';
            log('3. ECharts已就绪');
            initTestChart();
        }
        
        function initTestChart() {
            try {
                var dom = document.getElementById('test-chart');
                log('6. DOM元素: ' + (dom ? '找到' : '未找到'));
                log('7. DOM尺寸: ' + dom.offsetWidth + 'x' + dom.offsetHeight);
                
                var chart = echarts.init(dom);
                log('8. echarts.init成功: ' + (chart ? '是' : '否'));
                
                chart.setOption({
                    title: { text: 'ECharts测试图表', left: 'center' },
                    tooltip: {},
                    xAxis: { data: ['A', 'B', 'C', 'D', 'E'] },
                    yAxis: {},
                    series: [{ name: '销量', type: 'bar', data: [5, 20, 36, 10, 15] }],
                    backgroundColor: '#ffffff'
                });
                log('9. setOption成功！图表应可见');
                statusEl.textContent = '✅ 图表初始化成功！如果看不到柱状图，说明渲染有问题';
                statusEl.style.background = '#e8f5e9';
            } catch(e) {
                log('6. 初始化失败: ' + e.message);
                statusEl.textContent = '❌ 图表初始化失败: ' + e.message;
                statusEl.style.background = '#ffebee';
            }
        }
    </script>
</body>
</html>
