<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
    <style>
        /* Fortune Red 色卡系统 */
        :root {
            /* Fortune Red 发财红 */
            --fr-50: #FCF6F7;
            --fr-100: #FCF6F7;
            --fr-200: #EFBEC6;
            --fr-300: #E08090;
            --fr-400: #DA687A;
            --fr-500: #D75B70;
            --fr-600: #CD374F;
            --fr-700: #A7293D;
            --fr-800: #801F2F;
            --fr-900: #56151F;
            
            /* Cinnabar 朱砂深红 */
            --ci-500: #D04E59;
            --ci-600: #C03340;
            --ci-700: #992833;
            
            /* Misty Pink 柔雾粉 */
            --mp-200: #FCF6F7;
            --mp-300: #F6DFE2;
            
            /* Elegant Cream 雅致米黄 */
            --ec-500: #F2EBC8;
            
            /* Coral Orange 珊瑚橘 */
            --co-500: #F37969;
            --co-600: #EF4D38;
            
            /* RMB Gold 经典金 */
            --rg-500: #D0B671;
            
            /* Jade Green 玉绿 */
            --jg-500: #82AE8E;
            --jg-600: #669C74;
            --jg-700: #517D5D;
            
            /* Cerulean 天青蓝 */
            --ce-100: #F8F9FB;
            --ce-500: #C1CEDE;
            --ce-700: #6A89AF;
            --ce-900: #32465E;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--fr-50);
            color: var(--fr-900);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            z-index: 1000;
            border-bottom: 3px solid var(--fr-500);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(86,21,31,0.08);
        }
        
        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--fr-700);
        }
        
        .nav-links {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .nav-link {

            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .nav-link:hover {
            background: rgba(215,91,112,0.1);
            color: var(--fr-700);
            border-color: var(--fr-300);
        }
        
        .nav-divider {

            padding: 80px 0 40px;
            text-align: center;

        .report-title {

            font-weight: 700;

            -webkit-text-fill-color: transparent;
            background-clip: text;

        .report-subtitle {

            color: var(--ci-700);
            margin-bottom: 30px;

            justify-content: center;

            flex-wrap: wrap;
            margin-top: 30px;

            border: 1px solid var(--mp-300);
            border-radius: 12px;

            box-shadow: 0 2px 12px rgba(86,21,31,0.08);
        }

            border-color: var(--fr-500);
            box-shadow: 0 4px 20px rgba(215,91,112,0.15);
        }

            font-weight: 700;
            color: var(--fr-600);

        .metric-label {

            color: var(--ce-700);
            margin-top: 5px;

            margin: 0 auto;
            padding: 20px;

            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

            color: #ffffff;
            width: 36px;
            height: 36px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;

            margin-bottom: 30px;
            padding-left: 48px;

            gap: 25px;

            border: 1px solid var(--mp-300);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(86,21,31,0.08);

        .chart-title {
            font-size: 16px;
            color: var(--fr-800);
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .chart {
            height: 400px;
            width: 100%;
            background: #ffffff !important;
        }

            margin: 20px 0;
            font-size: 14px;

            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--fr-300);
        }
        
        .data-table td {

            border-bottom: 1px solid var(--mp-200);
            color: var(--fr-900);

            color: var(--jg-700);
            background: rgba(130,174,142,0.15);

            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
            display: inline-block;
        }
        
        .tag-negative {
            color: var(--ci-700);
            background: rgba(208,4,89,0.1);

            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
            display: inline-block;
        }

            color: var(--co-600);
            background: rgba(243,121,105,0.15);

            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
            display: inline-block;

            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
            display: inline-block;

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;

        .insight-card.danger {
            background: linear-gradient(135deg, rgba(208,4,89,0.1), rgba(153,40,51,0.05));
            border-color: rgba(153,40,51,0.2);
        }
        
        .insight-card.success {
            background: linear-gradient(135deg, rgba(130,174,142,0.1), rgba(81,125,93,0.05));
            border-color: rgba(81,125,93,0.2);

            font-size: 16px;
            font-weight: 600;
            color: var(--fr-700);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;

        .insight-card.warning .insight-title {
            color: var(--co-600);
        }
        
        .insight-card.danger .insight-title {
            color: var(--ci-700);
        }
        
        .insight-card.success .insight-title {
            color: var(--jg-700);
        }
        
        .insight-content {
            color: var(--fr-900);
            font-size: 14px;
            line-height: 1.7;
        }
        
        .insight-content ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .insight-content li {
            margin: 5px 0;
        }

        .quote-box {
            background: var(--fr-50);
            border: 1px solid var(--mp-300);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
            font-style: italic;
            color: var(--fr-800);
            position: relative;
        }
        
        .quote-box::before {
            content: '"';
            font-size: 3rem;
            color: var(--fr-400);
            opacity: 0.5;
            position: absolute;
            top: -10px;
            left: 10px;
        }
        
        .quote-text {
            margin-left: 2rem;
        }
        
        .quote-source {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: var(--ce-700);
            text-align: right;
            font-style: normal;
        }
        
        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(215,91,112,0.1), rgba(208,182,113,0.1));
            border-radius: 8px;
            padding: 1.25rem;
            text-align: center;
            border: 1px solid var(--mp-300);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--fr-600);
            margin-bottom: 0.25rem;
        }
        
        .stat-label {

            color: var(--ce-700);
        }
        
        /* 行动建议卡片 */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .action-card {
            padding: 1rem;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid var(--mp-300);
        }
        
        .action-title {
            font-weight: 600;
            color: var(--fr-700);
            margin-bottom: 0.5rem;
        }
        
        .action-list {
            color: var(--ce-700);
            font-size: 0.9rem;
            list-style: none;
        }
        
        .action-list li {
            margin: 0.5rem 0;
        }

        .footer {
            text-align: center;
            padding: 40px 0;
            color: var(--ce-700);
            font-size: 13px;
            border-top: 1px solid var(--mp-300);
            margin-top: 50px;
        }
        
        /* NPS样式 */
        .nps-high {
            color: var(--jg-700);
            font-weight: 600;
        }
        
        .nps-mid {
            color: var(--co-600);
            font-weight: 600;
        }
        
        .nps-low {
            color: var(--ci-700);
            font-weight: 600;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .chart-grid {
                grid-template-columns: 1fr;
            }
            
            .report-title {
                font-size: 28px;
            }
            
            .key-metrics {
                gap: 15px;
            }
            
            .metric-card {
                padding: 15px 25px;
            }
            
            .metric-value {
                font-size: 28px;
            }
            
            .content-section {
                padding: 20px;
            }
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;

        ::-webkit-scrollbar-track {

            border-radius: 4px;
        }

        }

        }
        
        .platform-stat {

            border: 1px solid var(--mp-300);

        }
        
        .platform-value {

            font-weight: 600;
            color: var(--fr-500);
        }
        
        .platform-name {

            color: var(--ce-700);
        }
        
        /* 标签 */
        .tag-hot {
            color: var(--fr-700);
            background: rgba(215,91,112,0.1);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
            display: inline-block;
        }
        
        /* 图例 */
        .legend {

            gap: 1.5rem;
            flex-wrap: wrap;

        }
        
        .legend-item {
